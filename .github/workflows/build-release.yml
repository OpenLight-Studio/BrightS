name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    name: Build BrightS Kernel Image
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake nasm mtools dosfstools qemu-system-x86 ovmf git clang lld

      - name: Configure CMake
        run: CC=clang LD=lld cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brights-images
          path: |
            build/brights.iso
            build/brights-efi.img
            build/brights-disk.img

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/brights.iso
            build/brights-efi.img
            build/brights-disk.img
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
